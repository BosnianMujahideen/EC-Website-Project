<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bosnian Flag Animation</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      background: skyblue;
      overflow: hidden;
    }

    .flagpole {
      width: 8px;
      height: 300px;
      background: #444;
      position: relative;
    }

    .flag {
      width: 180px;
      height: 120px;
      position: absolute;
      bottom: 0;
      left: 8px;
      transform-origin: left center;
      animation: rise 3s ease-out forwards, wave 2s infinite ease-in-out 3s;
    }

    /* Rising animation */
    @keyframes rise {
      from {
        bottom: 0;
      }
      to {
        bottom: 180px;
      }
    }

    /* Waving animation */
    @keyframes wave {
      0% { transform: rotate(0deg); }
      25% { transform: rotate(2deg); }
      50% { transform: rotate(0deg); }
      75% { transform: rotate(-2deg); }
      100% { transform: rotate(0deg); }
    }

    svg {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

  <div class="flagpole">
    <div class="flag">
      <!-- Bosnia Flag SVG -->
      <svg viewBox="0 0 3 2">
        <!-- Blue background -->
        <rect width="3" height="2" fill="#002F6C"/>
        
        <!-- Yellow triangle -->
        <polygon points="3,0 1.5,1 3,2" fill="#FCD116"/>
        
        <!-- Stars -->
        <g fill="white">
          <circle cx="1.5" cy="0.2" r="0.08"/>
          <circle cx="1.3" cy="0.4" r="0.08"/>
          <circle cx="1.1" cy="0.6" r="0.08"/>
          <circle cx="0.9" cy="0.8" r="0.08"/>
          <circle cx="0.7" cy="1.0" r="0.08"/>
          <circle cx="0.5" cy="1.2" r="0.08"/>
          <circle cx="0.3" cy="1.4" r="0.08"/>
        </g>
      </svg>
    </div>
  </div>

</body>
</html>
